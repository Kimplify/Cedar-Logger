name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Quality Checks
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Run detekt
        run: ./gradlew detekt

      - name: Check API compatibility
        run: ./gradlew apiCheck

  test:
    name: Tests
    runs-on: macos-latest
    needs: check
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests
        run: ./gradlew :cedar-logging:jvmTest

      - name: Run Android unit tests
        run: ./gradlew :cedar-logging:testReleaseUnitTest

      - name: Run iOS simulator tests
        run: ./gradlew :cedar-logging:iosSimulatorArm64Test

      - name: Generate coverage report
        run: ./gradlew :cedar-logging:koverHtmlReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cedar-logging/build/reports/kover/html/
